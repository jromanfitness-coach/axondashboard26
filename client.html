<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TF Client Training Portal</title>
<style>
:root{--bg:#05070a;--panel:#0d121a;--tile:#101a26;--blue:#1f8cff;--soft:#64b4ff;--cream:#f8f1e3;--muted:#a9b4c2;--green:#73d99f;--yellow:#ffd166;--red:#ff6b6b;--line:rgba(255,255,255,.14);--shadow:0 28px 82px rgba(0,0,0,.55)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--cream);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:radial-gradient(circle at 12% 9%,rgba(31,140,255,.26),transparent 34%),radial-gradient(circle at 88% 86%,rgba(100,180,255,.10),transparent 34%),linear-gradient(135deg,#05070a,#07111d 56%,#05070a);padding:clamp(15px,2.6vw,34px)}button,input{font:inherit}.grid-bg{position:fixed;inset:0;pointer-events:none;opacity:.22;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.85),transparent 85%)}.wrap{max-width:1320px;margin:0 auto;position:relative;z-index:1}.card{border:1px solid var(--line);background:linear-gradient(160deg,rgba(13,18,26,.94),rgba(8,13,20,.95));border-radius:26px;box-shadow:var(--shadow)}.mark{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),rgba(100,180,255,.42));font-weight:1000;font-size:23px;letter-spacing:-.08em;box-shadow:0 0 30px rgba(31,140,255,.36)}.eyebrow{color:var(--soft);font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.18em}.login{width:min(720px,100%);margin:min(14vh,120px) auto 0;overflow:hidden}.login-layout{display:grid;grid-template-columns:1.1fr .9fr}.login-copy{padding:38px;border-right:1px solid rgba(255,255,255,.11);background:linear-gradient(145deg,rgba(31,140,255,.15),rgba(7,12,20,.2) 65%)}.login-copy h1{font-size:clamp(34px,5vw,58px);line-height:.91;letter-spacing:-.07em;text-transform:uppercase;margin:12px 0}.login-copy p{color:var(--muted);line-height:1.55;font-size:14px}.login-pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:22px}.login-pills span{border:1px solid rgba(100,180,255,.32);background:rgba(31,140,255,.10);border-radius:999px;padding:7px 9px;color:var(--soft);font-size:10px;font-weight:950;letter-spacing:.08em;text-transform:uppercase}.login-form{padding:34px;display:grid;align-content:center;gap:12px}.login-form h2{font-size:28px;letter-spacing:-.05em;margin:0}.login-form input{width:100%;border:1px solid var(--line);border-radius:14px;background:rgba(4,8,13,.74);padding:14px;color:var(--cream);outline:none}.login-form input:focus{border-color:var(--soft);box-shadow:0 0 0 3px rgba(31,140,255,.15)}.primary{border:1px solid rgba(100,180,255,.6);border-radius:14px;background:linear-gradient(135deg,var(--blue),#145fbe);color:white;font-weight:950;padding:14px;box-shadow:0 0 30px rgba(31,140,255,.24);cursor:pointer}.primary:hover{transform:translateY(-1px)}.error{min-height:18px;color:var(--red);font-size:12px;font-weight:850}.tiny{color:var(--muted);font-size:12px;line-height:1.45}.staff-link{display:flex;align-items:center;justify-content:space-between;gap:8px;border-top:1px solid rgba(255,255,255,.1);margin-top:4px;padding-top:14px;text-decoration:none;color:var(--soft);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.07em}.staff-link:hover{color:var(--cream)}.top{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:18px}.brand{display:flex;gap:14px;align-items:center}.brand h1{margin:4px 0 0;font-size:clamp(26px,3vw,42px);letter-spacing:-.055em;line-height:.95;text-transform:uppercase}.logout{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--cream);border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}.hero{padding:24px;display:grid;grid-template-columns:1fr auto;gap:20px;margin-bottom:16px;border-color:rgba(100,180,255,.42);background:linear-gradient(135deg,rgba(31,140,255,.16),rgba(12,18,27,.94) 58%,rgba(31,140,255,.05))}.hero h2{margin:8px 0 0;font-size:clamp(30px,4vw,50px);letter-spacing:-.06em;line-height:.92;text-transform:uppercase}.muted{color:var(--muted);font-size:14px;line-height:1.45}.status{min-width:245px;border:1px solid rgba(115,217,159,.34);border-radius:20px;padding:16px;background:rgba(115,217,159,.075)}.status strong{display:block;margin-top:8px;color:var(--green);font-size:20px}.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:11px;margin-bottom:16px}.week-card{border:1px solid var(--line);border-radius:17px;background:rgba(16,26,38,.82);color:var(--cream);padding:14px;text-align:left;cursor:pointer;transition:.15s ease}.week-card:hover,.week-card.active{transform:translateY(-2px);border-color:var(--soft);box-shadow:0 16px 38px rgba(31,140,255,.12)}.week-card.active{background:linear-gradient(145deg,rgba(31,140,255,.23),rgba(16,26,38,.92))}.week-name{font-size:17px;font-weight:950;letter-spacing:-.03em}.week-meta{display:flex;justify-content:space-between;gap:8px;margin-top:6px;color:var(--muted);font-size:11px;font-weight:800}.focus-bar{display:flex;height:5px;overflow:hidden;border-radius:999px;background:rgba(255,255,255,.08);margin-top:12px}.focus-bar i:nth-child(1){background:var(--blue)}.focus-bar i:nth-child(2){background:var(--soft)}.focus-bar i:nth-child(3){background:var(--green)}.focus-icons{margin-top:8px;color:var(--soft);font-size:10px;font-weight:850}.overview{padding:21px;margin-bottom:16px}.overview-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.overview h3{margin:6px 0 0;font-size:24px;letter-spacing:-.045em}.chip{display:inline-flex;align-items:center;border:1px solid rgba(100,180,255,.32);background:rgba(31,140,255,.10);color:var(--soft);border-radius:999px;padding:7px 10px;font-size:11px;font-weight:950;letter-spacing:.07em;text-transform:uppercase}.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}.group{border:1px solid rgba(255,255,255,.1);border-radius:15px;padding:12px;background:rgba(255,255,255,.025)}.group-top{display:flex;justify-content:space-between;gap:10px;color:var(--muted);font-size:12px;font-weight:900}.group-top b{color:var(--cream)}.bar{height:7px;margin-top:10px;border-radius:999px;overflow:hidden;background:rgba(255,255,255,.08)}.bar span{display:block;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),var(--soft))}.tabs{display:flex;gap:8px;overflow:auto;padding-bottom:3px;margin-bottom:14px}.tab{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.04);color:var(--muted);border-radius:12px;padding:11px 14px;font-weight:900;cursor:pointer}.tab.active{background:var(--blue);color:white;border-color:var(--soft);box-shadow:0 0 22px rgba(31,140,255,.25)}.workout{padding:24px}.workout-top{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.workout h3{font-size:clamp(28px,3.4vw,48px);letter-spacing:-.06em;line-height:.94;margin:10px 0}.circuits{display:grid;gap:12px;margin-top:20px}.circuit{border:1px solid rgba(255,255,255,.12);border-radius:18px;overflow:hidden;background:rgba(5,9,14,.52)}.circuit-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 17px;background:linear-gradient(90deg,rgba(31,140,255,.14),rgba(255,255,255,.025))}.circuit-head b{font-size:17px;letter-spacing:-.02em}.exercise{display:grid;grid-template-columns:38px 1fr auto;gap:13px;align-items:center;padding:14px 17px;border-top:1px solid rgba(255,255,255,.08)}.num{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(31,140,255,.13);color:var(--soft);font-size:12px;font-weight:950}.exercise strong{display:block;font-size:16px}.exercise small{display:block;color:var(--muted);margin-top:4px;line-height:1.35}.target{font-size:16px;font-weight:950;color:var(--cream);white-space:nowrap}.empty{padding:28px;text-align:center;color:var(--muted)}@media(max-width:750px){body{padding:14px}.login-layout{grid-template-columns:1fr}.login-copy{border-right:0;border-bottom:1px solid rgba(255,255,255,.1)}.login-copy,.login-form{padding:24px}.top{align-items:flex-start}.hero{grid-template-columns:1fr}.status{min-width:0}.workout-top{flex-direction:column}.exercise{grid-template-columns:34px 1fr}.target{grid-column:2}.group-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="grid-bg"></div>
<main class="wrap" id="app"></main>
<script>
const app=document.getElementById('app');
let state={board:null,week:0,selected:0,pin:'',poll:null};
function esc(value){return String(value??'').replace(/[&<>"']/g,function(s){return({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'})[s]})}
function groups(week){const map={Upper:0,Lower:0,Push:0,Pull:0,Core:0,Conditioning:0};const words={Upper:['press','push up','pushup','row','pull','curl','raise','chest','shoulder','lat','tricep','bicep'],Lower:['squat','lunge','deadlift','rdl','leg','calf','hip','glute','hamstring'],Push:['press','push up','pushup','tricep','chest','shoulder'],Pull:['row','pull','curl','lat','bicep'],Core:['plank','crunch','dead bug','pallof','core','sit up','carry'],Conditioning:['bike','row erg','sled','rope','burpee','run','jump','climber','stair','carry']};let total=0;(week.programs||[]).forEach(p=>(p.circuits||[]).forEach(c=>(c.stations||[]).forEach(s=>{total++;const n=(s.exercise||'').toLowerCase();Object.keys(words).forEach(k=>{if(words[k].some(w=>n.includes(w)))map[k]++})})));return Object.entries(map).map(([name,count])=>({name,count,pct:total?Math.round(count/total*100):0})).filter(x=>x.count).sort((a,b)=>b.pct-a.pct)}
async function fetchPortal(pin){const response=await fetch('/.netlify/functions/client-portal',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'client-login',pin}),cache:'no-store'});let result={};try{result=await response.json()}catch{}if(!response.ok||!result.ok)throw new Error(result.error||'The client portal could not be reached.');return result}
function stopPolling(){if(state.poll){clearInterval(state.poll);state.poll=null}}
function startPolling(){stopPolling();state.poll=setInterval(async()=>{try{const result=await fetchPortal(state.pin);const changed=(result.publishedAt||'')!==(state.board?.publishedAt||'');state.board=result.board;if(changed)renderPortal()}catch(err){}},20000)}
function renderLogin(error=''){stopPolling();app.innerHTML=`<section class="card login"><div class="login-layout"><section class="login-copy"><div class="mark">TF</div><div class="eyebrow" style="margin-top:18px">Tifton Fitness • Client Portal</div><h1>Train With<br>Purpose.</h1><p>Your coach publishes the current Workout Builder board here. This separate portal is view-only and updates automatically when new programming is posted.</p><div class="login-pills"><span>Live Workouts</span><span>Weekly Focus</span><span>View Only</span></div></section><form class="login-form" id="login"><div class="eyebrow">Client training access</div><h2>Open Workouts</h2><p class="tiny">Enter the shared client PIN provided by your coach.</p><input id="pin" autocomplete="one-time-code" inputmode="text" placeholder="Client portal PIN" autofocus><button class="primary">Open Training Board</button><div class="error">${esc(error)}</div><div class="tiny">Temporary testing PIN: <b style="color:var(--cream)">axon26</b></div><a class="staff-link" href="/">Staff member? Return to dashboard <span>→</span></a></form></div></section>`;document.getElementById('login').onsubmit=async e=>{e.preventDefault();const pin=document.getElementById('pin').value.trim();try{const result=await fetchPortal(pin);state.pin=pin;state.board=result.board;state.week=0;state.selected=0;renderPortal();startPolling()}catch(err){renderLogin(err.message)}}}
function weekCard(week,index){const focus=groups(week).slice(0,3),count=(week.programs||[]).length;return `<button class="week-card ${state.week===index?'active':''}" onclick="state.week=${index};state.selected=0;renderPortal()"><div class="week-name">${esc(week.week||'Week '+(index+1))}</div><div class="week-meta"><span>${count} workout${count===1?'':'s'}</span><span>${focus[0]?focus[0].name:'Unassigned'}</span></div><div class="focus-bar">${focus.map(x=>`<i style="flex:${Math.max(1,x.pct)}"></i>`).join('')}</div><div class="focus-icons">${focus.map(x=>`${x.name} ${x.pct}%`).join(' · ')||'No movements yet'}</div></button>`}
function workoutMarkup(program){return `<section class="card workout"><div class="workout-top"><div><div class="chip">${esc((program.mode||'strength').toUpperCase())}${program.mode==='timed'?` • ${esc(program.work||0)}s / ${esc(program.rest||0)}s`:''}</div><h3>${esc(program.name||'Workout')}</h3><p class="muted">${esc(program.desc||'Complete every circuit with focused execution and follow the coaching notes.')}</p></div><div class="chip">${esc(program.rounds||3)} rounds</div></div><div class="circuits">${(program.circuits||[]).map((circuit,circuitIndex)=>`<article class="circuit"><div class="circuit-head"><b>${esc(circuit.name||'Circuit '+(circuitIndex+1))}</b><span class="chip">${(circuit.stations||[]).length} exercises</span></div>${(circuit.stations||[]).map((station,index)=>`<div class="exercise"><div class="num">${index+1}</div><div><strong>${esc(station.exercise||'Exercise')}</strong><small>${esc(station.note||'Use controlled form and follow coach direction.')}</small></div><div class="target">${esc(station.prescription||'—')}</div></div>`).join('')}</article>`).join('')}</div></section>`}
function renderPortal(){const weeks=state.board?.weeks||[];if(!weeks.length){app.innerHTML='<section class="card empty">No workouts have been published yet. Ask your coach to publish the current Workout Builder board.</section>';return}const week=weeks[state.week]||weeks[0],programs=week.programs||[];if(state.selected>=programs.length)state.selected=0;const program=programs[state.selected];const focus=groups(week);app.innerHTML=`<header class="top"><div class="brand"><div class="mark">TF</div><div><div class="eyebrow">Client Training Portal</div><h1>Workout Board</h1></div></div><button class="logout" onclick="stopPolling();state={board:null,week:0,selected:0,pin:'',poll:null};renderLogin()">Log out</button></header><section class="card hero"><div><div class="eyebrow">Current Training Week</div><h2>${esc(week.week||'Current Week')}</h2><p class="muted">${esc(week.summary||'Your current programming is synced from the coach Workout Builder.')}</p></div><div class="status"><div class="eyebrow">Board status</div><strong>✓ Training Ready</strong><p class="muted">Live sync checks every 20 seconds.<br>Updated ${new Date(state.board.publishedAt||Date.now()).toLocaleString()}</p></div></section><section class="week-grid">${weeks.map(weekCard).join('')}</section><section class="card overview"><div class="overview-head"><div><div class="eyebrow">Weekly Training Outline</div><h3>Muscle Grouping & Focus</h3><p class="muted">Calculated from the exercises inside this saved week.</p></div><span class="chip">${programs.length} workouts</span></div><div class="group-grid">${focus.length?focus.map(x=>`<div class="group"><div class="group-top"><span>${x.name}</span><b>${x.pct}%</b></div><div class="bar"><span style="width:${x.pct}%"></span></div></div>`).join(''):'<div class="muted">Add movements in the dashboard to build the weekly outline.</div>'}</div></section><nav class="tabs">${programs.map((item,index)=>`<button class="tab ${index===state.selected?'active':''}" onclick="state.selected=${index};renderPortal()">${esc(item.name||'Workout '+(index+1))}</button>`).join('')}</nav>${program?workoutMarkup(program):'<section class="card empty">No workouts are programmed for this week.</section>'}`}
renderLogin();
</script>
</body>
</html>
