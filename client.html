<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Tifton Fitness | Client Training Portal</title><style>
:root{--bg:#05070A;--panel:rgba(13,18,26,.88);--tile:#101A26;--blue:#1F8CFF;--soft:#64B4FF;--cream:#F8F1E3;--muted:#A9B4C2;--green:#73D99F;--yellow:#FFD166;--red:#FF6B6B;--line:rgba(255,255,255,.14);--shadow:0 28px 80px rgba(0,0,0,.56)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 18% 10%,rgba(31,140,255,.32),transparent 34%),radial-gradient(circle at 88% 88%,rgba(100,180,255,.12),transparent 34%),linear-gradient(135deg,#05070A,#07101A 58%,#05070A);color:var(--cream);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.grid-bg{position:fixed;inset:0;pointer-events:none;opacity:.45;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);background-size:44px 44px;mask-image:linear-gradient(#000,transparent 90%)}.wrap{position:relative;max-width:1180px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;gap:16px;align-items:center;margin-bottom:20px}.brand{display:flex;align-items:center;gap:13px}.mark{height:52px;width:52px;border-radius:17px;display:grid;place-items:center;background:linear-gradient(145deg,var(--blue),rgba(100,180,255,.42));font-size:23px;font-weight:950;box-shadow:0 0 34px rgba(31,140,255,.36)}.eyebrow{font-size:11px;color:var(--soft);font-weight:900;letter-spacing:.18em;text-transform:uppercase}.top h1{font-size:clamp(24px,4vw,42px);letter-spacing:-.05em;line-height:1;margin:5px 0 0}.logout{border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--cream);border-radius:13px;padding:11px 14px;font-weight:800;cursor:pointer}.card{background:var(--panel);backdrop-filter:blur(18px);border:1px solid var(--line);border-radius:26px;box-shadow:var(--shadow)}.login{max-width:520px;margin:8vh auto;padding:30px}.login h2{font-size:clamp(30px,5vw,48px);letter-spacing:-.06em;margin:12px 0 8px}.login p,.muted{color:var(--muted);line-height:1.5}.login input{width:100%;margin:16px 0 9px;padding:15px;border:1px solid var(--line);border-radius:14px;background:rgba(5,7,10,.65);color:var(--cream);font-size:18px;outline:none}.login input:focus{border-color:var(--soft);box-shadow:0 0 0 3px rgba(31,140,255,.15)}.primary{border:1px solid rgba(100,180,255,.55);background:linear-gradient(135deg,var(--blue),#1361bf);color:white;border-radius:14px;padding:14px 17px;font-weight:900;cursor:pointer;box-shadow:0 0 28px rgba(31,140,255,.30);width:100%}.error{min-height:18px;color:var(--red);font-size:13px;font-weight:800;margin-top:10px}.hero{padding:25px;display:grid;grid-template-columns:1.15fr .85fr;gap:16px;margin-bottom:16px}.hero h2{font-size:clamp(34px,5vw,58px);letter-spacing:-.065em;line-height:.92;margin:8px 0}.status{align-self:stretch;border:1px solid rgba(115,217,159,.36);border-radius:20px;padding:19px;background:linear-gradient(135deg,rgba(115,217,159,.11),rgba(255,255,255,.03))}.status strong{display:block;font-size:24px;margin-top:10px}.week-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:11px;margin:16px 0}.week-card{position:relative;border:1px solid var(--line);border-radius:19px;background:linear-gradient(160deg,rgba(255,255,255,.045),rgba(255,255,255,.018));padding:15px;text-align:left;color:var(--cream);cursor:pointer;overflow:hidden;transition:.18s ease}.week-card:hover{transform:translateY(-2px);border-color:rgba(100,180,255,.48);box-shadow:0 14px 34px rgba(31,140,255,.13)}.week-card.active{border-color:var(--blue);background:linear-gradient(145deg,rgba(31,140,255,.25),rgba(16,26,38,.92));box-shadow:0 0 28px rgba(31,140,255,.18)}.week-card:after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 90% 0%,rgba(100,180,255,.2),transparent 42%);pointer-events:none}.week-card>*{position:relative;z-index:1}.week-name{font-weight:950;font-size:17px;letter-spacing:-.025em}.week-meta{display:flex;justify-content:space-between;gap:8px;color:var(--muted);font-size:12px;margin-top:7px}.focus-bar{display:flex;gap:3px;height:6px;margin-top:13px}.focus-bar i{display:block;border-radius:999px;background:var(--soft);min-width:5px}.focus-icons{margin-top:9px;color:var(--soft);font-size:11px;font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.overview{padding:18px;margin-bottom:16px}.overview-head{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}.overview h3{font-size:clamp(23px,3vw,34px);letter-spacing:-.05em;margin:6px 0}.group-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(125px,1fr));gap:9px;margin-top:14px}.group{border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.025);padding:11px}.group-top{display:flex;justify-content:space-between;gap:7px;font-size:11px;color:var(--muted);font-weight:850;text-transform:uppercase;letter-spacing:.06em}.group b{color:var(--cream)}.bar{height:6px;background:rgba(255,255,255,.10);border-radius:999px;overflow:hidden;margin-top:9px}.bar span{height:100%;display:block;background:linear-gradient(90deg,var(--blue),var(--soft));border-radius:999px}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.tab{border:1px solid var(--line);background:rgba(255,255,255,.035);color:var(--muted);border-radius:999px;padding:10px 13px;font-weight:800;cursor:pointer}.tab.active{background:rgba(31,140,255,.20);border-color:rgba(100,180,255,.6);color:var(--cream);box-shadow:0 0 20px rgba(31,140,255,.20)}.workout{padding:23px}.workout-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;border-bottom:1px solid var(--line);padding-bottom:18px}.workout h3{font-size:clamp(27px,4vw,45px);letter-spacing:-.055em;line-height:.94;margin:7px 0}.chip{display:inline-flex;border:1px solid rgba(100,180,255,.34);background:rgba(31,140,255,.11);color:var(--soft);border-radius:999px;padding:7px 9px;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}.circuits{display:grid;gap:14px;margin-top:18px}.circuit{border:1px solid var(--line);border-radius:20px;overflow:hidden;background:rgba(255,255,255,.025)}.circuit-head{padding:15px 17px;background:rgba(31,140,255,.07);display:flex;justify-content:space-between;gap:10px;align-items:center}.circuit-head b{font-size:18px}.exercise{display:grid;grid-template-columns:40px 1fr auto;gap:12px;align-items:center;padding:14px 17px;border-top:1px solid rgba(255,255,255,.08)}.num{width:30px;height:30px;border-radius:10px;display:grid;place-items:center;background:rgba(31,140,255,.13);color:var(--soft);font-size:12px;font-weight:900}.exercise strong{display:block;font-size:16px}.exercise small{display:block;color:var(--muted);margin-top:3px}.target{font-size:16px;font-weight:950;color:var(--cream);white-space:nowrap}.empty{padding:26px;text-align:center;color:var(--muted)}.staff-link{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:18px;padding-top:16px;border-top:1px solid var(--line);color:var(--soft);font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;text-decoration:none}.staff-link:hover{color:var(--cream)}.staff-link span{font-size:18px;line-height:1}@media(max-width:720px){.wrap{padding:15px}.top{align-items:flex-start}.hero{grid-template-columns:1fr}.workout-top{flex-direction:column}.exercise{grid-template-columns:34px 1fr}.target{grid-column:2}.logout{padding:9px 11px}}
</style></head><body><div class="grid-bg"></div><main class="wrap" id="app"></main><script>
const app=document.getElementById('app');let state={profile:null,board:null,selected:0,week:0,pin:'',poll:null};
function esc(v){return String(v??'').replace(/[&<>"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]))}
function groups(week){const map={Upper:0,Lower:0,Push:0,Pull:0,Core:0,Conditioning:0};const words={Upper:['press','push up','pushup','row','pull','curl','raise','chest','shoulder','lat','tricep','bicep'],Lower:['squat','lunge','deadlift','rdl','leg','calf','hip','glute','hamstring'],Push:['press','push up','pushup','tricep','chest','shoulder'],Pull:['row','pull','curl','lat','bicep'],Core:['plank','crunch','dead bug','pallof','core','sit up','carry'],Conditioning:['bike','row erg','sled','rope','burpee','run','jump','climber','stair','carry']};let total=0;(week.programs||[]).forEach(p=>(p.circuits||[]).forEach(c=>(c.stations||[]).forEach(s=>{total++;const n=(s.exercise||'').toLowerCase();Object.keys(words).forEach(k=>{if(words[k].some(w=>n.includes(w)))map[k]++})})));return Object.entries(map).map(([name,count])=>({name,count,pct:total?Math.round(count/total*100):0})).filter(x=>x.count).sort((a,b)=>b.pct-a.pct)}
async function fetchClientBoard(pin){const r=await fetch('/.netlify/functions/client-portal?pin='+encodeURIComponent(pin),{cache:'no-store'});const x=await r.json();if(!r.ok||!x.ok)throw Error(x.error||'PIN not recognized.');return x}
function stopPolling(){if(state.poll){clearInterval(state.poll);state.poll=null;}}
function startPolling(){stopPolling();state.poll=setInterval(async()=>{try{const x=await fetchClientBoard(state.pin);const changed=(x.publishedAt||'')!==(state.board?.publishedAt||'');state.profile=x.profile;state.board=x.board;if(changed)renderPortal();}catch(err){}},20000)}
function renderLogin(error=''){stopPolling();app.innerHTML=`<section class="card login"><div class="mark">TF</div><div class="eyebrow" style="margin-top:18px">Tifton Fitness • Client Training Portal</div><h2>Your training,<br>ready when you are.</h2><p>This is a separate, view-only login. Enter the personal PIN provided by your coach to see only your assigned workout plan.</p><form id="login"><input id="pin" autocomplete="one-time-code" inputmode="text" placeholder="Client PIN" autofocus><button class="primary">Open My Workouts</button><div class="error">${esc(error)}</div></form><a class="staff-link" href="/">Staff member? Return to the admin dashboard <span>→</span></a></section>`;document.getElementById('login').onsubmit=async e=>{e.preventDefault();const pin=document.getElementById('pin').value.trim();try{const x=await fetchClientBoard(pin);state.pin=pin;state.profile=x.profile;state.board=x.board;state.week=0;state.selected=0;renderPortal();startPolling()}catch(err){renderLogin(err.message)}}}
function weekCard(w,i){const g=groups(w).slice(0,3),count=(w.programs||[]).length;return `<button class="week-card ${state.week===i?'active':''}" onclick="state.week=${i};state.selected=0;renderPortal()"><div class="week-name">${esc(w.week||'Week '+(i+1))}</div><div class="week-meta"><span>${count} workout${count===1?'':'s'}</span><span>${g[0]?g[0].name:'Unassigned'}</span></div><div class="focus-bar">${g.map(x=>`<i style="flex:${Math.max(1,x.pct)}"></i>`).join('')}</div><div class="focus-icons">${g.map(x=>`${x.name} ${x.pct}%`).join(' · ')||'No movements yet'}</div></button>`}
function renderPortal(){const weeks=state.board.weeks||[];if(!weeks.length){app.innerHTML='<section class="card empty">Your coach has not published any workouts yet.</section>';return}const week=weeks[state.week]||weeks[0],programs=week.programs||[];if(state.selected>=programs.length)state.selected=0;const p=programs[state.selected];const focus=groups(week);app.innerHTML=`<header class="top"><div class="brand"><div class="mark">TF</div><div><div class="eyebrow">Client Workout Portal</div><h1>Welcome, ${esc(state.profile.name)}</h1></div></div><button class="logout" onclick="stopPolling();state={profile:null,board:null,selected:0,week:0,pin:'',poll:null};renderLogin()">Log out</button></header><section class="card hero"><div><div class="eyebrow">${esc(state.profile.label||'Assigned Training')}</div><h2>${esc(week.week||'Current Week')}</h2><p class="muted">${esc(week.summary||'Your current workout board is synced from your coach’s dashboard.')}</p></div><div class="status"><div class="eyebrow">Board status</div><strong>✓ Training Ready</strong><p class="muted">View-only workout access<br>Live sync enabled • Updated ${new Date(state.board.publishedAt||Date.now()).toLocaleString()}</p></div></section><section class="week-grid">${weeks.map(weekCard).join('')}</section><section class="card overview"><div class="overview-head"><div><div class="eyebrow">Weekly Training Outline</div><h3>Muscle Grouping & Focus</h3><p class="muted">Calculated from the exercises scheduled inside this week.</p></div><span class="chip">${programs.length} workouts</span></div><div class="group-grid">${focus.length?focus.map(x=>`<div class="group"><div class="group-top"><span>${x.name}</span><b>${x.pct}%</b></div><div class="bar"><span style="width:${x.pct}%"></span></div></div>`).join(''):'<div class="muted">Add movements in the dashboard to build the weekly outline.</div>'}</div></section><nav class="tabs">${programs.map((x,i)=>`<button class="tab ${i===state.selected?'active':''}" onclick="state.selected=${i};renderPortal()">${esc(x.name||'Workout '+(i+1))}</button>`).join('')}</nav>${p?workoutMarkup(p):'<section class="card empty">No workouts are programmed for this week.</section>'}`}
function workoutMarkup(p){return `<section class="card workout"><div class="workout-top"><div><div class="chip">${esc((p.mode||'strength').toUpperCase())}${p.mode==='timed'?` • ${esc(p.work||0)}s / ${esc(p.rest||0)}s`:''}</div><h3>${esc(p.name||'Workout')}</h3><p class="muted">${esc(p.desc||'Complete each circuit with controlled execution and coach notes in mind.')}</p></div><div class="chip">${esc(p.rounds||3)} rounds</div></div><div class="circuits">${(p.circuits||[]).map((c,ci)=>`<article class="circuit"><div class="circuit-head"><b>${esc(c.name||'Circuit '+(ci+1))}</b><span class="chip">${(c.stations||[]).length} exercises</span></div>${(c.stations||[]).map((s,i)=>`<div class="exercise"><div class="num">${i+1}</div><div><strong>${esc(s.exercise||'Exercise')}</strong><small>${esc(s.note||'Use controlled form and follow your coach’s instructions.')}</small></div><div class="target">${esc(s.prescription||'—')}</div></div>`).join('')}</article>`).join('')}</div></section>`}
renderLogin();
</script></body></html>
